<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TaskNova - Dashboard</title>
  <link rel="stylesheet" href="../css/dashboard.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="layout">
  <aside class="sidebar">
    <h2 class="logo">TaskNova</h2>
    <nav>
      <a href="dashboard.html" class="active">Dashboard</a>
      <a href="tasks.html">Tasks</a>
      <a href="calendar.html">Calendar</a>
      <a href="analytics.html">Analytics</a>
      <a href="settings.html">Settings</a>
      <a href="logout.html">Logout</a>
    </nav>
  </aside>
  <main class="content">
    <h1>Dashboard</h1>
    <div class="stats-grid">
      <div class="card stat">
        <h3>Total Tasks</h3>
      </div>

      <div class="card stat">
        <h3>Completed</h3>
      </div>

      <div class="card stat">
        <h3>Pending</h3>
      </div>

      <div class="card stat">
        <h3>Productivity</h3>
      </div>
    </div>
    <div class="card">
      <h2>Recent Tasks</h2>
      <table>
        <thead>
          <tr>
            <th>Task</th>
            <th>Deadline</th>
            <th>Status</th>
            <th>Priority</th>
          </tr>
        </thead>
      </table>
    </div>

  </main>

</div>

</body>
<script src="../js/dashboard.js"></script>
</html>
